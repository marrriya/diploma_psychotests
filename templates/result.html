<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Результаты</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style/result.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<div class="test-container">

    <h2>Результаты теста</h2>

    <div class="result-layout">

    <div class="results-block">
        {% for r in results %}
            <div class="question-box">

                <h3>{{ r.name }}</h3>

                <p>
                    <strong>{{ r.score }} / {{ r.max }}</strong>
                </p>

                {% if r.title %}
                    <p><strong>{{ r.title }}</strong></p>
                {% endif %}

                {% if r.desc %}
                    <p>{{ r.desc }}</p>
                {% endif %}

            </div>
        {% endfor %}
    </div>

    <div class="chart">
        <canvas id="chart"></canvas>
    </div>

</div>

    <div class="navigation">
        <a href="/">
            <button>На главную</button>
        </a>
            <form method="GET" action="/retake/{{ test_id }}">
            <button type="submit">Пройти тест заново</button>
        </form>
    </div>


</div>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const chartConfig = {{ chart_config | tojson | safe }};
</script>
<script>
    if (!chartConfig) {
        console.error("chartConfig пустой");
    }
</script>
<script type="module" src="{{ url_for('static', filename='js/visualizations/index.js') }}"></script>
