<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Авторизация</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="form-container">
    <h2>{{ 'Вход' if mode == 'login' else 'Регистрация' }}</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="Логин" required>
        <input type="password" name="password" placeholder="Пароль" required>
        <input type="hidden" name="action" value="{{ mode }}">
        <button type="submit">{{ 'Войти' if mode == 'login' else 'Зарегистрироваться' }}</button>
    </form>

    {% if mode == 'login' %}
        <p>Нет аккаунта? <a href="{{ url_for('auth', mode='register') }}">Зарегистрироваться</a></p>
    {% else %}
        <p>Уже есть аккаунт? <a href="{{ url_for('auth', mode='login') }}">Войти</a></p>
    {% endif %}
</div>
</body>
</html>
