  {name:"A1", e:12, n:8, p:6, l:14},

  {name:"A9", e:7, n:15, p:11, l:8},
  {name:"A10", e:13, n:6, p:5, l:14}

// ===== KPI =====
function renderKPI(){
  const avg = k => Math.round(students.reduce((a,s)=>a+s[k],0)/students.length);

  document.getElementById("kpi").innerHTML = `
    <div>E<br><b>${avg('e')}</b></div>
    <div>N<br><b>${avg('n')}</b></div>
    <div>P<br><b>${avg('p')}</b></div>
    <div>L<br><b>${avg('l')}</b></div>
  `;
}

// ===== INTERPRET =====
function interpret(s){
  if(s.e > 12 && s.n < 10) return "Экстраверт, устойчив";
  if(s.e > 12 && s.n >= 10) return "Импульсивный тип";
  if(s.e <= 12 && s.n >= 10) return "Тревожный интроверт";
  return "Сбалансированный профиль";
}

  data: {
    datasets: [{
      data: students.map(s => ({x:s.e, y:s.n})),
      backgroundColor: 'black'
    }]
  },
  options: {
    onClick: (e, el)=>{
      if(el.length){
        current = students[el[0].index];
        update();
      }

    scales:{
      x:{min:0,max:20,title:{display:true,text:"Экстраверсия"}},
      y:{min:0,max:20,title:{display:true,text:"Нейротизм"}}
    }

});

function createRadialData(student){

  // значения шкал
  const values = [
    student.e,
    student.n,
    student.p,
    student.l
  ];

  // цвета шкал
  const colors = [
    "red",
    "blue",
    "green",
    "purple"
  ];

  return {
    values,
    colors
  };
}

// ===== TABLE =====

const scaleColors = {
  e: "red",
  n: "blue",
  p: "green",
  l: "purple"
};

const radar = new Chart(document.getElementById('radar'), {

  type: 'radar',

  data: {

    // оси = ученики
    labels: students.map(s => s.name),

    datasets: [
      {
        data: students.map(() => 0),

        // скрываем стандартный radar
        showLine: false,
        pointRadius: 0,
        borderWidth: 0
      }
    ]
  },

  options: {

    responsive: true,
    maintainAspectRatio: false,

    scales: {
      r: {

        beginAtZero: true,
        suggestedMax: 20,

        grid: {
          circular: true,
          color: 'rgba(0,0,0,0.08)'
        },

        angleLines: {
          color: 'rgba(0,0,0,0.1)'
        },

        ticks: {
          display: false
        },

        pointLabels: {
          display: true,
          font: {
            size: 13
          }
        }
      }
    },

    plugins: {
      legend: {
        display: false
      }
    }
  },

  plugins: [

    // ===== ЦЕНТР =====
    {
      id: 'centerCircle',

      afterDraw(chart) {

        const {
          ctx,
          chartArea: {
            left,
            right,
            top,
            bottom
          }
        } = chart;

        const x = (left + right) / 2;
        const y = (top + bottom) / 2;

        ctx.save();

        ctx.beginPath();
        ctx.arc(x, y, 28, 0, Math.PI * 2);

        ctx.fillStyle = 'white';
        ctx.fill();

        ctx.lineWidth = 2;
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.stroke();

        ctx.restore();
      }
    },

    // ===== КАСТОМНЫЕ ТОЧКИ =====
    {
      id: 'customPoints',

      afterDraw(chart) {

        const {
          ctx,
          scales: { r }
        } = chart;

        const meta = chart.getDatasetMeta(0);

        students.forEach((student, i) => {

          const angle = meta.data[i].angle;

          const scalesData = [
            { value: student.e, color: scaleColors.e },
            { value: student.n, color: scaleColors.n },
            { value: student.p, color: scaleColors.p },
            { value: student.l, color: scaleColors.l }
          ];

          scalesData.forEach(scale => {

            const radius = r.getDistanceFromCenterForValue(scale.value);

            const x =
              r.xCenter + Math.cos(angle) * radius;

            const y =
              r.yCenter + Math.sin(angle) * radius;

            ctx.beginPath();

            ctx.arc(x, y, 6, 0, Math.PI * 2);

            ctx.fillStyle = scale.color;
            ctx.fill();
          });
        });
      }
    }
  ]
});


function renderTable(){
  let html = "";
  students.forEach((s,i)=>{
    html += `<tr onclick="selectStudent(${i})">
      <td>${s.name}</td>
      <td>${s.e}</td>
      <td>${s.n}</td>
      <td>${s.p}</td>
      <td>${s.l}</td>
    </tr>`;
  });
  document.getElementById("table").innerHTML = html;
}

// ===== UPDATE =====
function update(){

  const radialData = createRadialData(current);

  radar.data.datasets = [

    // Основные точки
    {
      data: radialData.values,
      showLine: false,
      pointBackgroundColor: radialData.colors,
      pointRadius: 6
    },

    // Лучи
    ...radialData.values.flatMap((value, i) => {

      let datasets = [];

      for(let s = 1; s <= value; s++){

        let arr = new Array(radialData.values.length).fill(null);
        arr[i] = s;

        datasets.push({
          data: arr,
          showLine: false,
          pointRadius: 5,
          pointBackgroundColor: radialData.colors[i]
        });
      }

      return datasets;
    })
  ];

  radar.update();

  document.getElementById("studentName").innerText = current.name;

  document.getElementById("interpretation").innerText =
    interpret(current);
}

function selectStudent(i){
  current = students[i];
  update();
}
