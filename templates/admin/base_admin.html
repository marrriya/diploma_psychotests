<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
</head>
<body>

    <h3>Админка</h3>
    <a href="/admin/users">Пользователи</a><br>
    <a href="/admin/tests">Тесты</a>

</body>
</html>
