{% extends 'admin/base_admin.html' %}
{% block content %}
<h2>Тесты</h2>
<a href="/admin/tests/create">Создать</a>
<table>
<tr><th>ID</th><th>Название</th><th>Тема</th><th></th></tr>
{% for t in tests %}
<tr>
<td>{{ t.id }}</td>
<td>{{ t.title }}</td>
<td>{{ t.topic }}</td>
<td>
<a href="/admin/tests/edit/{{ t.id }}">Редактировать</a>
<a href="/admin/tests/delete/{{ t.id }}" onclick="return confirm('Удалить?')">Удалить</a>
</td>
</tr>
{% endfor %}
</table>
{% endblock %}
