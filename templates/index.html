<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Главная</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style/main.css') }}">
    <script defer src="{{ url_for('static', filename='js/main.js') }}"></script>
</head>

<body>

<header class="header">
    <div class="logo">MindScape</div>

    <nav class="nav">
        <a href="/" class="active">Каталог тестов</a>
        <a href="/completed">Пройденные тесты</a>
        <!-- <a href="/portrait">Цифровой портрет</a> -->
        <a href="/group_tests">Групповые тесты</a>
    </nav>



    <div class="user-panel">
        {% if username %}
            <span class="username">{{ username }}</span>
            <a href="/logout" class="logout">Выйти</a>
        {% else %}
            <a href="/auth">Войти</a>
        {% endif %}
    </div>
</header>

<main>
    <!-- <h2>Групповые тесты</h2>. добавить логику, если есть, показываем блок -->
    <h2>Все тесты</h2>
    {% for topic, test_list in tests.items() %}
        <div class="category">
            <h3>{{ topic }}</h3>

            <div class="tests">
                {% for test in test_list %}
                    <a href="/test/{{ test.id }}" 
                       class="test-card {% if test.id in completed_tests %}completed{% endif %}">
                        
                        <div class="test-title">{{ test.title }}</div>
                        <div class="test-desc">{{ test.description }}</div>

                    </a>
                {% endfor %}
            </div>
        </div>
    {% endfor %}

</main>

</body>
</html>
